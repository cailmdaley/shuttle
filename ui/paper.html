<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASTRA paper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      The four semantic faces @lightcone/styles/tokens.css declares:
      EB Garamond (body), Spectral (astra elements), IBM Plex Mono (technical),
      JetBrains Mono (sidenote chrome). Loaded via <link> rather than CSS
      @import — Tailwind v4 + LightningCSS warn on @import after expansion.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="paper"></div>
    <script type="module" src="/src/paper/main.tsx"></script>
  </body>
</html>
